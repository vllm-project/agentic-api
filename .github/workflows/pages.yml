name: Deploy Docs (GitHub Pages)

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.14"
          enable-cache: true

      - name: Build docs (locked)
        working-directory: responses
        run: |
          uv sync --frozen --extra docs
          uv run --no-sync mkdocs build --strict -f ../mkdocs.yml -d "${GITHUB_WORKSPACE}/site"

      - name: Verify site artifact exists
        run: |
          test -d site
          test -f site/index.html
          ls -la site | head -n 50

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
